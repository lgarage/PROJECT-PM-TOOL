<style>
/* --- Twin Pillars Branding --- */
body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  margin: 20px;
  background: #f7f9fb;
  color: #333;
}
.card {
  max-width: 900px;
  margin: auto;
  background: #fff;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  box-sizing: border-box;
}

/* Header & Logo */
.header-logo {
  text-align: center;
  margin-bottom: 10px;
}
.header-logo img {
  max-width: 180px;
  height: auto;
}
h2 {
  text-align: center;
  color: #1e4b85; /* Twin Pillars Dark Blue */
  margin-top: 0;
  margin-bottom: 5px;
  font-weight: bold;
}
#draftStatus {
  text-align: center;
  color: #777;
  margin-bottom: 20px;
}

/* Form Elements */
label {
  font-weight: bold;
  display: block;
  margin-top: 18px;
  color: #1e4b85;
  font-size: 14px;
}
input, textarea, select {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  margin-top: 6px;
  box-sizing: border-box;
  border: 1px solid #ccc;
  border-radius: 6px;
  background: #fafbfc;
  font-family: inherit;
  transition: border-color 0.2s;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #c89b53; /* Twin Pillars Gold */
  box-shadow: 0 0 5px rgba(200, 155, 83, 0.3);
  background: #fff;
}
textarea {
  min-height: 90px;
  white-space: pre-wrap;
  overflow-wrap: break-word;
  resize: vertical;
}

/* Buttons */
button {
  padding: 12px;
  margin-top: 14px;
  font-size: 16px;
  width: 100%;
  border: 1px solid #dcdcdc;
  border-radius: 6px;
  background: #f2f4f6;
  color: #333;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s ease;
}
button:hover {
  background: #e2e6ea;
}
button:active {
  transform: scale(.98);
}

/* Mode Bar (Tabs) */
.modebar {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
  border-bottom: 2px solid #eaeaea;
  padding-bottom: 15px;
  margin-bottom: 20px;
}
.modebar button {
  width: auto;
  flex: 1;
  margin-top: 0;
  padding: 12px 16px;
  font-weight: bold;
  border-color: #ccc;
}
.modebar button.active {
  background: #1e4b85; 
  color: #fff;
  border-color: #1e4b85;
}

/* Pill Bar (Quick Add Equipment) */
.pillbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.pillbar button {
  width: auto;
  margin-top: 0;
  padding: 8px 12px;
  font-size: 14px;
  background: #fff;
  border: 1px solid #1e4b85;
  color: #1e4b85;
  font-weight: bold;
}
.pillbar button:hover { background: #f0f4f8; }

/* Primary Action Buttons */
#generate { background: #c89b53; color: #fff; border-color: #b58945; font-weight: bold; font-size: 1.1em; }
#generate:hover { background: #b58945; }
#copy { background: #1e4b85; color: #fff; border-color: #153661; font-weight: bold; }
#copy:hover { background: #153661; }
#clear { background: #fff; color: #e74c3c; border-color: #e74c3c; font-weight: bold; }
#clear:hover { background: #fdf2f1; }

.inline { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; }
.inline .grow { flex: 1 1 320px; }
.inline button { width: auto; background: #1e4b85; color: #fff; border: none; }

/* Output Area */
pre {
  background: #fdfdfd; padding: 20px; white-space: pre-wrap; border-radius: 8px;
  border: 1px solid #ccc; font-family: inherit; font-size: 15px; line-height: 1.5; color: #2c3e50;
}
.small { font-size: 13px; opacity: .75; margin-top: 6px; }
.hidden { display: none !important; }

/* History Section */
.history-box {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 20px;
  margin-top: 14px;
  background: #fafbfc;
}
.history-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}
.history-item {
  border: 1px solid #ddd;
  border-radius: 8px;
  background: #fff;
  padding: 15px;
  cursor: pointer;
  transition: all 0.2s;
}
.history-item:hover {
  background: #f0f4f8;
}
.history-item.active {
  border-color: #c89b53;
  background: #fdfaf2;
}
.history-title {
  font-weight: 700;
  color: #1e4b85;
}
.history-sub {
  font-size: 14px;
  opacity: .8;

.summary-card {
  border: 1px solid #ddd;
  border-radius: 10px;
  background: #fff;
  padding: 20px;
  margin-top: 15px;
}
.summary-card h3 {

  font-size: 18px;
  color: #1e4b85;
  border-bottom: 2px solid #f2f2f2;
  padding-bottom: 10px;

.summary-row { margin-top: 10px; font-size: 15px; }
.summary-label { font-weight: 700; color: #555; }
hr.soft { border: none; border-top: 1px solid #e5e5e5; margin: 25px 0; }

@media print {

    .card, .modebar, #entrySection, #historySection, button { display: none !important; }
}

<div class="header-logo">

<div class="small" id="draftStatus"></div>

  <button id="modeHistory" type="button">HISTORY</button>

  <div id="techPanel" style="background: #eaf2f8; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #b9d5ec;">

</div>

/* ---------- location local formatting fallback ---------- */
function titleCaseWords(str){
  return str
    .split(" ")
    .filter(Boolean)
    .map(w => {
      const upper = w.toUpperCase();
      if(/^\d/.test(w)) return w;
      if(["NW","NE","SW","SE"].includes(upper)) return upper;
      return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
    })
    .join(" ");
}

function normalizeStreetSuffix(street){
  let s = street.trim().toLowerCase();
  s = s.replace(/\bavenue\b/g, "Ave.");
  s = s.replace(/\bstreet\b/g, "St.");
  s = s.replace(/\broad\b/g, "Rd.");
  s = s.replace(/\bdrive\b/g, "Dr.");
  s = s.replace(/\bboulevard\b/g, "Blvd.");
  s = s.replace(/\blane\b/g, "Ln.");
  s = s.replace(/\bcourt\b/g, "Ct.");
  s = s.replace(/\bplace\b/g, "Pl.");
  s = s.replace(/\bhighway\b/g, "Hwy.");
  return titleCaseWords(s);
}

function normalizeSiteName(name){
  let s = (name || "").trim().toLowerCase();
  s = s.replace(/^(the|a|an)\s+/i, ""); 
  s = s.replace(/\s{2,}/g, " ").trim();
  return titleCaseWords(s);
}

function formatLocation(raw){
  let t = (raw || "").trim().toLowerCase();
  if(!t) return "";

  t = t.replace(/^(i am at|i'm at|im at|we are at|heading to|i am in|i'm in|im in|i am on|i'm on|im on)\s+/i, "");
  t = t.replace(/[.,]/g, " ");
  t = t.replace(/\bthe\b/gi, " ");
  t = t.replace(/\s{2,}/g, " ").trim();

  let m;
  
  m = t.match(/^(.+?)\s+in\s+(.+?)\s+at\s+(.+)$/i);
  if(m){
    return `${normalizeSiteName(m[3])} - ${titleCaseWords(m[2])} - ${normalizeStreetSuffix(m[1])}`;
  }

  m = t.match(/^(.+?)\s+on\s+(.+?)\s+at\s+(.+)$/i);
  if(m){
    return `${normalizeSiteName(m[3])} - ${titleCaseWords(m[1])} - ${normalizeStreetSuffix(m[2])}`;
  }

  m = t.match(/^(.+?)\s+in\s+(.+?)\s+on\s+(.+)$/i);
  if(m){
    return `${normalizeSiteName(m[1])} - ${titleCaseWords(m[2])} - ${normalizeStreetSuffix(m[3])}`;
  }

  m = t.match(/^(.+?)\s+on\s+(.+?)\s+in\s+(.+)$/i);
  if(m){
    return `${normalizeSiteName(m[1])} - ${titleCaseWords(m[3])} - ${normalizeStreetSuffix(m[2])}`;
  }

  m = t.match(/^(.+?)\s+in\s+(.+)$/i);
  if(m){
    return `${normalizeSiteName(m[1])} - ${titleCaseWords(m[2])}`;
  }

  return normalizeSiteName(t);
}

/* ---------- generic helpers ---------- */
function convertNumbers(text){
  let t = text || "";
  Object.keys(NUM_MAP).forEach(k => {
    const r = new RegExp("\\b" + k + "\\b", "gi");
    t = t.replace(r, NUM_MAP[k]);
  });
  return t;
}

function levenshtein(a, b){
  const m = a.length;
  const n = b.length;
  const dp = Array.from({length:m + 1}, () => Array(n + 1).fill(0));
  for(let i = 0; i <= m; i++) dp[i][0] = i;
  for(let j = 0; j <= n; j++) dp[0][j] = j;
  for(let i = 1; i <= m; i++){
    for(let j = 1; j <= n; j++){
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(
        dp[i - 1][j] + 1,
        dp[i][j - 1] + 1,
        dp[i - 1][j - 1] + cost
      );
    }
  }
  return dp[m][n];
}

function closestMatch(value, list, maxDistance){
  let best = value;
  let bestScore = Infinity;
  list.forEach(item => {
    const d = levenshtein(value.toUpperCase(), item.toUpperCase());
    if(d < bestScore){
      bestScore = d;
      best = item;
    }
  });
  return bestScore <= maxDistance ? best : value;
}

function autoGrow(el){
  if(!el) return;
  el.style.height = "auto";
  el.style.height = Math.max(el.scrollHeight, 90) + "px";
}

function escapeHtml(text){
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function getCustomerFromLocation(location){
  const parts = String(location || "").split(" - ").map(s => s.trim()).filter(Boolean);
  return parts.length ? parts[0] : "Unknown";
}

/* ---------- equipment parsing ---------- */
function normalizeEquipmentSpeech(text){
  let t = (text || "").toLowerCase();
  t = t.replace(/\n/g, " ");
  t = t.replace(/[–—]/g, "-");
  t = t.replace(/\s+and\s+/g, ", ");
  t = t.replace(/\s{2,}/g, " ").trim();

  t = t.replace(/\bare\s*to\s*you\b/g, "rtu");
  t = t.replace(/\bar\s*to\s*you\b/g, "rtu");
  t = t.replace(/\br\s*to\s*you\b/g, "rtu");
  t = t.replace(/\br\s*too\s*you\b/g, "rtu");
  t = t.replace(/\br\s*two\s*you\b/g, "rtu");
  t = t.replace(/\br\s*t\s*u\b/g, "rtu");
  t = t.replace(/\brt\s*you\b/g, "rtu");
  t = t.replace(/\brt\s*u\b/g, "rtu");
  t = t.replace(/\brt\b/g, "rtu");
  t = t.replace(/\bhour\s*to\s*you\b/g, "rtu");
  t = t.replace(/\bone\s*hour\s*to\s*you\b/g, "1 rtu");
  t = t.replace(/\b1\s*hour\s*to\s*you\b/g, "1 rtu");

  t = t.replace(/\bfurnaces?\b/g, "furnace");
  t = t.replace(/\bunit heaters?\b/g, "unit heater");
  t = t.replace(/\bradiant heaters?\b/g, "radiant heater");
  t = t.replace(/\bexhaust fans?\b/g, "exhaust fan");
  t = t.replace(/\bmake[\s-]?up air(?: unit)?s?\b/g, "mua");
  t = t.replace(/\brooftop units?\b/g, "rtu");

  t = convertNumbers(t);
  return t;
}

function expandEquipmentCounts(text){
  let t = normalizeEquipmentSpeech(text);

  const patterns = [
    {re:/\b(\d+)\s*rtu\b/g, code:"RTU"},
    {re:/\b(\d+)\s*furnace\b/g, code:"F"},
    {re:/\b(\d+)\s*unit heater\b/g, code:"UH"},
    {re:/\b(\d+)\s*radiant heater\b/g, code:"RH"},
    {re:/\b(\d+)\s*exhaust fan\b/g, code:"EF"},
    {re:/\b(\d+)\s*mua\b/g, code:"MUA"}
  ];

  const out = [];
  patterns.forEach(p => {
    let m;
    while((m = p.re.exec(t)) !== null){
      const count = parseInt(m[1], 10);
      if(!Number.isNaN(count) && count > 0 && count < 50){
        for(let i = 1; i <= count; i++) out.push(p.code + i);
      }
    }
  });

  const directMatches = [...t.matchAll(/\b(RTU|RH|UH|F|EF|MUA)\s*-?\s*(\d+)\b/gi)];
  directMatches.forEach(m => {
    out.push(m[1].toUpperCase() + m[2]);
  });

  const unique = [];
  out.forEach(x => {
    if(!unique.includes(x)) unique.push(x);
  });

  return unique.join(", ");
}

function parseEquipCodes(codeCsv){
  return (codeCsv || "").split(",").map(s => s.trim()).filter(Boolean);
}

function expandEquipment(codeCsv){
  const codes = parseEquipCodes(codeCsv);
  if(!codes.length) return "Not listed";
  return codes.map(c => {
    const m = c.match(/^([A-Z]+)(\d+)$/);
    if(!m) return c;
    const label = EQUIP_LABELS[m[1]] || m[1];
    return `${m[1]}${m[2]} (${label})`;
  }).join("\n");
}

function firstUnitOfType(codes, type){
  return codes.find(c => c.startsWith(type)) || null;
}

function formatEquipmentFieldValue(raw){
  const codes = expandEquipmentCounts(raw);
  return codes || raw;
}

/* ---------- parts parsing ---------- */
function normalizeFilterSize(rawSize){
  let s = (rawSize || "").toUpperCase().trim();
  s = s.replace(/\bbuy\b/gi, "BY");
  s = convertNumbers(s);
  s = s.replace(/\s+BY\s+/gi, "X");
  s = s.replace(/\s*X\s*/gi, "X");
  s = s.replace(/\s+/g, "");
  s = s.replace(/[^0-9X]/g, "");

  const nums = s.split("X").filter(Boolean);
  if(nums.length === 3){
    s = `${nums[0]}X${nums[1]}X${nums[2]}`;
  }

  return closestMatch(s, KNOWN_FILTER_SIZES, 2).toUpperCase();
}

function normalizeBeltCode(rawCode){
  let s = (rawCode || "").toUpperCase().trim();
  s = s.replace(/\s+/g, "");
  s = s.replace(/[-_]/g, "");
  const m = s.match(/^(AX|BX|A|B|4L)(\d+)$/);
  if(m){
    const code = m[1] + m[2];
    return closestMatch(code, KNOWN_BELTS, 1).toUpperCase();
  }
  return closestMatch(s, KNOWN_BELTS, 1).toUpperCase();
}

function formatPartOutput(qty, value){
  return `${qty} - ${String(value).toUpperCase()}`;
}

function recoverConcatenatedFilter(firstNum, secondNum, thirdNum){
  const a = String(firstNum);
  const b = String(secondNum);
  const c = String(thirdNum);

  for(let i = 1; i < a.length; i++){
    const qty = a.slice(0, i);
    const firstDim = a.slice(i);
    const candidate = `${firstDim}X${b}X${c}`;
    const matched = closestMatch(candidate, KNOWN_FILTER_SIZES, 2);
    if(KNOWN_FILTER_SIZES.includes(matched)){
      return `${parseInt(qty, 10)} - ${matched}`;
    }
  }
  return null;
}

function parsePartItem(item){
  let t = item.toLowerCase().trim();
  if(!t) return [];

  t = t.replace(/\bbuy\b/g, "by");
  t = convertNumbers(t);
  t = t.replace(/\s{2,}/g, " ").trim();
  t = t.replace(/\bfilters?\b/g, "").trim();
  t = t.replace(/\bbelts?\b/g, "").trim();

  let beltMatch = t.match(/^(\d+)\s+(ax|bx|a|b|4l)\s*-?\s*(\d+)$/i);
  if(beltMatch){
    const qty = parseInt(beltMatch[1], 10);
    const code = normalizeBeltCode(beltMatch[2] + beltMatch[3]);
    return [formatPartOutput(qty, code)];
  }

  beltMatch = t.match(/^(\d+)(ax|bx|a|b|4l)\s*-?\s*(\d+)$/i);
  if(beltMatch){
    const qty = parseInt(beltMatch[1], 10);
    const code = normalizeBeltCode(beltMatch[2] + beltMatch[3]);
    return [formatPartOutput(qty, code)];
  }

  beltMatch = t.match(/^(\d+)\s+(4)\s*l\s*(\d+)$/i);
  if(beltMatch){
    const qty = parseInt(beltMatch[1], 10);
    const code = normalizeBeltCode(`4L${beltMatch[3]}`);
    return [formatPartOutput(qty, code)];
  }

  let f = t;
  f = f.replace(/\s+by\s+/g, " x ");
  f = f.replace(/\s*x\s*/g, " x ");
  f = f.replace(/\s{2,}/g, " ").trim();

  let m = f.match(/^(\d+)\s+(\d+)\s+(\d+)\s*x\s*(\d+)$/i);
  if(m){
    const qty = parseInt(m[1], 10);
    const size = normalizeFilterSize(`${m[2]}x${m[3]}x${m[4]}`);
    return [formatPartOutput(qty, size)];
  }

  m = f.match(/^(\d+)\s+(\d+)\s*x\s*(\d+)\s*x\s*(\d+)$/i);
  if(m){
    const qty = parseInt(m[1], 10);
    const size = normalizeFilterSize(`${m[2]}x${m[3]}x${m[4]}`);
    return [formatPartOutput(qty, size)];
  }

  m = f.match(/^(\d+)x(\d+)x(\d+)x(\d+)$/i);
  if(m){
    const qty = parseInt(m[1], 10);
    const size = normalizeFilterSize(`${m[2]}x${m[3]}x${m[4]}`);
    return [formatPartOutput(qty, size)];
  }

  m = f.match(/^(\d+)\s+(\d+x\d+x\d+)$/i);
  if(m){
    const qty = parseInt(m[1], 10);
    const size = normalizeFilterSize(m[2]);
    return [formatPartOutput(qty, size)];
  }

  m = f.match(/^(\d+)\s+(\d+)\s*x\s*(\d+)$/i);
  if(m){
    const recovered = recoverConcatenatedFilter(m[1], m[2], m[3]);
    if(recovered) return [recovered];
  }

  const nums = f.match(/\d+/g);
  if(nums && nums.length === 4){
    const qty = parseInt(nums[0], 10);
    const size = normalizeFilterSize(`${nums[1]}x${nums[2]}x${nums[3]}`);
    return [formatPartOutput(qty, size)];
  }

  if(nums && nums.length === 3){
    const recovered = recoverConcatenatedFilter(nums[0], nums[1], nums[2]);
    if(recovered) return [recovered];
  }

  const beltNums = f.match(/^(\d+)\s*(ax|bx|a|b|4l)\s*(\d+)$/i);
  if(beltNums){
    const qty = parseInt(beltNums[1], 10);
    const code = normalizeBeltCode(beltNums[2] + beltNums[3]);
    return [formatPartOutput(qty, code)];
  }

  return [item.trim().toUpperCase()];
}

      .where('date', '==', todayStr)
      .get();

  const ticketId = document.getElementById('ticketSelector').value;

  // 1. Build location string and populate
  const locString = `${ticket.customerName} - ${ticket.locationAddress}`;
  document.getElementById('location').value = locString;

}

    const locSnapshot = await db.collection("MappedLocations")
      .where("Sub_Company", "==", subCompany)
      .where("Street", "==", street)
      .get();

    if (locSnapshot.empty) return null;

    // Grab the Parent ID
    const parentId = locSnapshot.docs[0].data().Parent_ID;

    // Look up the actual parent company name in "ParentCompanies"
    const parentDoc = await db.collection("ParentCompanies").doc(parentId).get();

    if (parentDoc.exists) {
      return parentDoc.data().Name; 
    }
    
    return null;
  } catch (error) {
    console.error("Firebase Lookup Error:", error);
    return null;
  }
}

// ---------------------------------------------------------
// NEW: CUSTOM JAVASCRIPT SORTING ENGINE
// This guarantees perfect sorting without relying on the AI
// ---------------------------------------------------------
function sortPartsArray(parts) {
  const filters = [];
  const belts = [];

  // 1. Separate into two groups
  parts.forEach(p => {
    if (p.includes('X')) filters.push(p);
    else belts.push(p);
  });

  // 2. Mathematically sort filters from smallest to largest
  filters.sort((a, b) => {
    const [a1, a2, a3] = (a.match(/\d+/g) || [0,0,0]).slice(-3).map(Number);
    const [b1, b2, b3] = (b.match(/\d+/g) || [0,0,0]).slice(-3).map(Number);
    if (a1 !== b1) return a1 - b1;
    if (a2 !== b2) return a2 - b2;
    return a3 - b3;
  });

  // 3. Alphabetically sort belts
  belts.sort((a, b) => {
    const beltA = a.split('-')[1] || a;
    const beltB = b.split('-')[1] || b;
    return beltA.trim().localeCompare(beltB.trim(), undefined, {numeric: true});
  });

  // 4. Combine them back together!
  return [...filters, ...belts];
}

function normalizeParts(text){
  let t = (text || "").trim();
  if(!t) return "";

  t = t.replace(/\s+and\s+/gi, ", ");
  t = t.replace(/\s{2,}/g, " ").trim();

  // Split the sentence by commas, semicolons, OR existing newlines
  const items = t.split(/[,;\n]+/).map(s => s.trim()).filter(Boolean);
  const out = [];

  items.forEach(item => {
    parsePartItem(item).forEach(x => {
      const cleaned = String(x)
        .replace(/\bFILTERS?\b/gi, "")
        .replace(/\bBELTS?\b/gi, "")
        .replace(/\s{2,}/g, " ")
        .trim()
        .toUpperCase();
      if(cleaned) out.push(cleaned);
    });
  });

  // Automatically pass everything through the Custom Sorter and join vertically!
  return sortPartsArray(out).join("\n");
}

/* ---------- notes ---------- */
function normalizeNotesForParsing(text){
  let t = (text || "").trim().toLowerCase();
  t = t.replace(/\n/g, " ");
  t = t.replace(/\s{2,}/g, " ").trim();

  t = t.replace(/\bare\s*to\s*you\b/g,"rtu");
  t = t.replace(/\bar\s*to\s*you\b/g,"rtu");
  t = t.replace(/\br\s*to\s*you\b/g,"rtu");
  t = t.replace(/\br\s*too\s*you\b/g,"rtu");
  t = t.replace(/\br\s*two\s*you\b/g,"rtu");
  t = t.replace(/\br\s*t\s*u\b/g,"rtu");
  t = t.replace(/\brt\s*you\b/g,"rtu");
  t = t.replace(/\brt\s*u\b/g,"rtu");
  t = t.replace(/\brt\b/g,"rtu");
  t = t.replace(/\bhour\s*to\s*you\b/g,"rtu");

  t = t.replace(/\bfurnaces?\b/g,"furnace");
  t = t.replace(/\bunit heaters?\b/g,"unit heater");
  t = t.replace(/\bradiant heaters?\b/g,"radiant heater");
  t = t.replace(/\bexhaust fans?\b/g,"exhaust fan");
  t = t.replace(/\bmake[\s-]?up air(?: unit)?s?\b/g,"mua");
  t = t.replace(/\brooftop units?\b/g,"rtu");

  t = convertNumbers(t);
  t = t.replace(/\b(rtu|rh|uh|f|ef|mua)\s*(\d+)\b/gi, (_, a, n) => `${a.toUpperCase()}${n}`);
  return t;
}

function extractRepairsFromNotes(notesText, equipCodes){
  const text = (notesText || "").trim();
  if(!text) return {general:"", repairs:[]};

  const pieces = text
    .replace(/\r/g,"")
    .split(/\n+|(?<=[.?!])\s+/)
    .map(s => s.trim())
    .filter(Boolean);

  const repairs = [];
  const general = [];

  function looksLikeRepair(s){
    return /\b(needs?|need|replace|replaced|failed|bad|broken|repair|recommend|suggest|not working|no heat|no cooling|leaking|motor|belt|capacitor|blower|fan|heat exchanger|cracked)\b/i.test(s);
  }

  pieces.forEach(piece => {
    const norm = normalizeNotesForParsing(piece);
    let unit = null;

    const explicit = norm.match(/\b(RTU|RH|UH|F|EF|MUA)\d+\b/i);
    if(explicit) unit = explicit[0].toUpperCase();

    if(!unit && /\brtu\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "RTU");
    if(!unit && /\bfurnace\b|\bf\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "F");
    if(!unit && /\bunit heater\b|\buh\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "UH");
    if(!unit && /\bradiant heater\b|\brh\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "RH");
    if(!unit && /\bexhaust fan\b|\bef\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "EF");
    if(!unit && /\bmua\b|make up air/i.test(norm)) unit = firstUnitOfType(equipCodes, "MUA");

    if(unit && looksLikeRepair(norm)){
      let msg = piece.trim();
      msg = msg.replace(/^(rtu|rt|furnace|unit heater|radiant heater|exhaust fan|make[\s-]?up air|mua|ef|rh|uh|f)\s*-?\s*(one|two|three|four|five|six|seven|eight|nine|ten|\d+)?\s*/i, "");
      msg = msg.replace(/^\s*[:\-–]\s*/, "");
      if(!msg) msg = "Repair needed.";
      repairs.push(`${unit} - ${msg}`);
    } else {
      general.push(piece);
    }
  });

  return {
    general: general.join(" ").trim(),
    repairs
  };
}

function populateHistoryLocations(){

function renderHistoryView(){
  const latestWrap = document.getElementById("historyLatestWrap");
  const olderWrap = document.getElementById("historyOlderWrap");
  const fullWrap = document.getElementById("historyFullWrap");
  const latest = document.getElementById("historyLatest");
  const olderList = document.getElementById("historyOlderList");
  const full = document.getElementById("historyFullReport");
  const data = getHistoryData();

  latestWrap.classList.add("hidden");
  olderWrap.classList.add("hidden");
  fullWrap.classList.add("hidden");
  latest.innerHTML = "";
  olderList.innerHTML = "";
  full.textContent = "";

  if(!currentHistoryCustomer || !currentHistoryLocation) return;
  if(!data[currentHistoryCustomer] || !data[currentHistoryCustomer][currentHistoryLocation]) return;

  const visits = data[currentHistoryCustomer][currentHistoryLocation];
  if(!visits.length) return;

  const latestVisit = visits[0];
  const s = buildVisitSummary(latestVisit);

  latest.innerHTML = `
    <div class="summary-row"><span class="summary-label">Date:</span> ${escapeHtml(s.date)}</div>
    <div class="summary-row"><span class="summary-label">Type:</span> ${escapeHtml(s.type)}</div>
    <div class="summary-row"><span class="summary-label">What was done last time:</span> ${escapeHtml(s.details)}</div>
    <div class="summary-row"><span class="summary-label">Parts used:</span> ${escapeHtml(s.parts)}</div>
  `;
  latestWrap.classList.remove("hidden");

  if(typeof currentHistorySelectedIndex !== "number" || currentHistorySelectedIndex >= visits.length){
    currentHistorySelectedIndex = 0;
  }

  if(visits.length > 1){
    olderWrap.classList.remove("hidden");
    visits.forEach((visit, idx) => {
      const box = document.createElement("div");
      const sum = buildVisitSummary(visit);
      box.className = "history-item" + (idx === currentHistorySelectedIndex ? " active" : "");
      box.innerHTML = `
        <div class="history-title">${escapeHtml(sum.date)} - ${escapeHtml(sum.type)}</div>
        <div class="history-sub">${escapeHtml(sum.details)}</div>
      `;
      box.onclick = () => {
        currentHistorySelectedIndex = idx;
        renderHistoryView();
      };
      olderList.appendChild(box);
    });
  } else {
    const box = document.createElement("div");
    const sum = buildVisitSummary(latestVisit);
    box.className = "history-item active";
    box.innerHTML = `
      <div class="history-title">${escapeHtml(sum.date)} - ${escapeHtml(sum.type)}</div>
      <div class="history-sub">${escapeHtml(sum.details)}</div>
    `;
    box.onclick = () => {
      currentHistorySelectedIndex = 0;
      renderHistoryView();
    };
    olderList.appendChild(box);
    olderWrap.classList.remove("hidden");
  }

  full.textContent = visits[currentHistorySelectedIndex].report || "";
  fullWrap.classList.remove("hidden");
}

function uploadReportToCloud(visitData, fullReportText) {
    if (typeof firebase === 'undefined' || !firebase.apps.length) return;
    
    const db = firebase.firestore();
    const techName = document.getElementById('techSelector').value || "Unknown Tech";
    const ticketId = document.getElementById('ticketSelector').value;
    
    // Grab the status the tech just selected from the dropdown
    const finalStatus = document.getElementById('finalJobStatus').value;

    // 1. Build the payload
    const payload = {
        ...visitData,
        fullReportText: fullReportText,
        techName: techName,
        linkedTicketId: ticketId || "None",
        status: finalStatus, 
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        deviceSavedAt: new Date().toISOString() 
    };

    const statusDisplay = document.getElementById("draftStatus");

    // 2. TRUE FIRE & FORGET: Add to the 'completed_reports' collection
    // Firebase instantly writes this locally and handles the upload invisibly in the background.
    db.collection('completed_reports').add(payload)
      .catch(e => console.error("Sync queued for when online."));

    // 3. Auto-Update the Ticket on the Dispatch Board!
    if (ticketId) {
        db.collection('service_calls').doc(ticketId).set({
            status: finalStatus, 
            techNotes: fullReportText
        }, { merge: true })
        .catch(e => console.error("Ticket update queued for when online."));
    }

    // 4. INSTANT UI FEEDBACK (Zero waiting)
    if (navigator.onLine) {
        statusDisplay.innerHTML = `<span style="color:#27ae60; font-weight:bold;">✓ Saved & syncing in background! Status updated to: ${finalStatus}</span>`;
    } else {
        statusDisplay.innerHTML = `<span style="color:#f39c12; font-weight:bold;">✓ Saved offline! Will sync invisibly when signal returns.</span>`;
    }
}

    const quoteEquipDisplay = parseEquipCodes(quoteEquipRaw).length
      ? expandEquipment(quoteEquipRaw)
      : (quoteEquipRaw || "Not listed");

    const issue = document.getElementById("quoteIssue").value.trim() || "Not listed.";
    const repairsCompleted = document.getElementById("quoteRepairs").value.trim() || "None.";
    
    const testing = document.getElementById("quoteTesting").value.trim() || "Tested and verified operations.";
    
    const recs = document.getElementById("quoteRecs").value.trim() || "None.";

    report = `QUOTED REPAIR\n\nLocation:\n${finalLocationDisplay}\n\nDate:\n${date}\n\nEquipment Repaired:\n${quoteEquipDisplay}\n\nOriginal Issue Resolved:\n${issue}\n\nRepairs Completed:\n${repairsCompleted}\n\nSystem Testing & Verification:\n${testing}\n\nFurther Recommendations:\n${recs}\n\nPictures:\nRepair photos attached.\n`;

    visit = {
      date,
      mode: "QUOTED REPAIR",
      customer: getCustomerFromLocation(location),
      location,
      equipmentRepaired: quoteEquipDisplay,
      originalIssue: issue,
      repairsCompleted: repairsCompleted,
      partsUsed: "NONE", 
      testingVerification: testing,
      recommendations: recs,
      report
    };
  }

if(report){
    document.getElementById("output").textContent = report;
    if(visit){
      saveVisitToHistory(visit);
      populateHistoryCustomers();
      
      // NEW: Send it to the cloud queue!
      uploadReportToCloud(visit, report);
    }
    saveDraft();
  }
};

/* Unified Add Equipment function */
function addEquipmentCode(fieldId, prefix){
  const el = document.getElementById(fieldId);
  const current = (el.value || "").trim();
  const codes = parseEquipCodes(current);
  let max = 0;

  codes.forEach(c => {
    const m = c.match(new RegExp("^" + prefix + "(\\d+)$"));
    if(m) max = Math.max(max, parseInt(m[1], 10));
  });

  const nextNum = max + 1;
  const appendText = current ? current + ", " + prefix + nextNum : prefix + nextNum;
  el.value = appendText;
  autoGrow(el);
  saveDraft();
}

function addEnterFormatter(id, formatter){
  const el = document.getElementById(id);
  if(!el) return;
  el.addEventListener("keydown", (e) => {
    if(
      e.key === "Enter" &&
      !["notes","reason","diagnosis","repairsMade","recommendations", "quoteIssue", "quoteRepairs", "quoteTesting", "quoteRecs"].includes(id)
    ){
      e.preventDefault();
      formatter();
      e.target.blur();
    }
  });
}

function wireAutosave(){
  [
    "location","equipment","notes","used","cost","next","workdone",
    "serviceEquipment","reason","diagnosis","repairsMade","serviceUsed","serviceCost","quoteParts","quoteLabor","recommendations",
    "quoteEquip","quoteIssue","quoteRepairs","quoteTesting","quoteRecs"
  ].forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener("input", () => {
      saveDraft();
      if(el.tagName.toLowerCase() === "textarea"){
        autoGrow(el);
      }
    });
  });

  // Attach the auto-parser to the location input box blur event
  document.getElementById("location").addEventListener("blur", autoParseLocation);

  document.getElementById("equipment").addEventListener("blur", formatEquipmentField);
  document.getElementById("used").addEventListener("blur", formatUsedField);
  document.getElementById("next").addEventListener("blur", formatNextField);
  
  document.getElementById("serviceEquipment").addEventListener("blur", formatServiceEquipmentField);
  document.getElementById("serviceUsed").addEventListener("blur", formatServiceUsedField);
  document.getElementById("quoteParts").addEventListener("blur", formatQuotePartsField);

  document.getElementById("quoteEquip").addEventListener("blur", formatQuoteEquipField);

  addEnterFormatter("location", autoParseLocation);
  addEnterFormatter("equipment", formatEquipmentField);
  addEnterFormatter("used", formatUsedField);
  addEnterFormatter("next", formatNextField);
  addEnterFormatter("serviceEquipment", formatServiceEquipmentField);
  addEnterFormatter("serviceUsed", formatServiceUsedField);
  addEnterFormatter("quoteParts", formatQuotePartsField);
  addEnterFormatter("quoteEquip", formatQuoteEquipField);

  document.addEventListener("visibilitychange", () => {
    if(document.visibilityState === "hidden") saveDraft();
  });

  window.addEventListener("pagehide", saveDraft);
}

/* ---------- init ---------- */
(function init(){
  // 1. Set the default value for the PM tab
  document.getElementById("workdone").value = DEFAULT_PM_WORKDONE;
  applyMode();

  // 2. Wipe the location box and output block clean
  document.getElementById("location").value = "";
  document.getElementById("output").textContent = "";

  // 3. Silently clear all fields for all three tabs
  const fieldsToClear = [
    "equipment","notes","used","cost","next",
    "serviceEquipment","reason","diagnosis","repairsMade","serviceUsed","serviceCost","quoteParts","quoteLabor","recommendations",
    "quoteEquip","quoteIssue","quoteRepairs","quoteTesting","quoteRecs"
  ];
  
  fieldsToClear.forEach(id => {
      const el = document.getElementById(id);
      if(el) {
          el.value = "";
          autoGrow(el); // Reset the height of textareas
      }
  });

  // 4. Overwrite the saved draft memory with this new, empty state
  saveDraft();
  
  document.getElementById("draftStatus").textContent = "New blank form ready.";
  populateHistoryCustomers();

  // 5. Load saved tech preference and fetch their tickets from the cloud
  const savedTech = localStorage.getItem('tp_saved_tech');
  if (savedTech) {
      document.getElementById('techSelector').value = savedTech;
      if (typeof fetchMyTickets === 'function') {
          fetchMyTickets();
      }
  }

  wireAutosave();
})();
  
</script>

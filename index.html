<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tech Note Tool | Twin Pillars</title>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<style>
/* --- Twin Pillars Branding --- */
body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  margin: 20px;
  background: #f0f2f5;
  color: #333;
}
.card {
  max-width: 1000px;
  margin: auto;
  background: #fff;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  box-sizing: border-box;
}

/* Header & Logo */
.header-logo {
  text-align: center;
  margin-bottom: 10px;
}
.header-logo img {
  max-width: 180px;
  height: auto;
}
h2 {
  text-align: center;
  color: #1e4b85; /* Twin Pillars Dark Blue */
  margin-top: 0;
  margin-bottom: 5px;
  font-weight: bold;
}
#draftStatus {
  text-align: center;
  color: #777;
  margin-bottom: 20px;
}

/* Form Elements */
label {
  font-weight: bold;
  display: block;
  margin-top: 18px;
  color: #1e4b85;
  font-size: 14px;
}
input, textarea, select {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  margin-top: 6px;
  box-sizing: border-box;
  border: 1px solid #ccc;
  border-radius: 6px;
  background: #fafbfc;
  font-family: inherit;
  transition: border-color 0.2s;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #c89b53; /* Twin Pillars Gold */
  box-shadow: 0 0 5px rgba(200, 155, 83, 0.3);
  background: #fff;
}
textarea {
  min-height: 90px;
  white-space: pre-wrap;
  overflow-wrap: break-word;
  resize: vertical;
}

/* Buttons */
button {
  padding: 12px;
  margin-top: 14px;
  font-size: 16px;
  width: 100%;
  border: 1px solid #dcdcdc;
  border-radius: 6px;
  background: #f2f4f6;
  color: #333;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s ease;
}
button:hover {
  background: #e2e6ea;
}
button:active {
  transform: scale(.98);
}

/* Mode Bar (Tabs) */
.modebar {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
  border-bottom: 2px solid #eaeaea;
  padding-bottom: 15px;
  margin-bottom: 20px;
}
.modebar button {
  width: auto;
  flex: 1;
  margin-top: 0;
  padding: 12px 16px;
  font-weight: bold;
  border-color: #ccc;
}
.modebar button.active {
  background: #1e4b85; 
  color: #fff;
  border-color: #1e4b85;
}

/* Pill Bar (Quick Add Equipment) */
.pillbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.pillbar button {
  width: auto;
  margin-top: 0;
  padding: 8px 12px;
  font-size: 14px;
  background: #fff;
  border: 1px solid #1e4b85;
  color: #1e4b85;
  font-weight: bold;
}
.pillbar button:hover { background: #f0f4f8; }

/* Primary Action Buttons */
#generate { background: #c89b53; color: #fff; border-color: #b58945; font-weight: bold; font-size: 1.1em; }
#generate:hover { background: #b58945; }
#copy { background: #1e4b85; color: #fff; border-color: #153661; font-weight: bold; }
#copy:hover { background: #153661; }
#clear { background: #fff; color: #e74c3c; border-color: #e74c3c; font-weight: bold; }
#clear:hover { background: #fdf2f1; }

.inline { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; }
.inline .grow { flex: 1 1 320px; }
.inline button { width: auto; background: #1e4b85; color: #fff; border: none; }

/* Output Area */
pre {
  background: #fdfdfd; padding: 20px; white-space: pre-wrap; border-radius: 8px;
  border: 1px solid #ccc; font-family: inherit; font-size: 15px; line-height: 1.5; color: #2c3e50;
}
.small { font-size: 13px; opacity: .75; margin-top: 6px; }
.hidden { display: none !important; }

@media print {
    body { background: #fff; margin: 0; padding: 0; }
    .card, .modebar, #entrySection, #historySection, button { display: none !important; }
}
</style>
</head>

<body>
<div class="card">

<div class="header-logo">
  <img src="tphc_logo.png" alt="Twin Pillars Logo">
</div>
<h2>Field Notes Tool</h2>
<div class="small" id="draftStatus"></div>

<div class="modebar">
  <button id="modePM" type="button" class="active">PM</button>
  <button id="modeService" type="button">SERVICE CALL</button>
  <button id="modeQuote" type="button">QUOTED REPAIR</button>
  <button id="modeHistory" type="button">HISTORY</button>
</div>

<div id="entrySection">
<label>Location</label>
  <div style="display: flex; gap: 8px;">
    <input id="location" style="flex: 1; margin-top: 0;" placeholder="Example: I'm at the Planet Fitness in Milwaukee on Main Street">
    <button id="locMagicBtn" type="button" style="margin-top: 0; width: auto; background: #1e4b85; color: white; border: none; padding: 0 15px; font-size: 18px; border-radius: 6px;" onclick="parseLocationWithAI()" title="Auto-Format Location">✨</button>
  </div>

  <div id="pmSection">
    <label>Equipment on Site</label>
    <textarea id="equipment" placeholder="Example: one RTU, one furnace, one unit heater, two radiant heaters"></textarea>

    <div class="pillbar">
      <button id="addRTU" type="button">+ RTU</button>
      <button id="addF" type="button">+ Furnace</button>
      <button id="addUH" type="button">+ Unit Heater</button>
      <button id="addRH" type="button">+ Radiant Heater</button>
      <button id="addEF" type="button">+ Exhaust Fan</button>
      <button id="addMUA" type="button">+ MUA</button>
    </div>

    <label>Notes / Repairs</label>
    <textarea id="notes" placeholder="Leave blank if everything is running good."></textarea>

    <label>Parts used</label>
    <textarea id="used" placeholder="Example: two 4l190 belts and two 20 by 24 by 2 filters"></textarea>

    <label>Cost of parts</label>
    <input id="cost" placeholder="Example: $23">

    <label>Parts needed next PM</label>
    <div class="inline">
      <div class="grow">
        <textarea id="next" placeholder="Tap Same if identical to Parts used"></textarea>
      </div>
      <button id="same" type="button">Same</button>
    </div>

    <label>Work done</label>
    <input id="workdone">
  </div>

  <div id="serviceSection" class="hidden">
    <label>Equipment worked on</label>
    <textarea id="serviceEquipment" placeholder="Example: one RTU, one furnace..."></textarea>
    
    <div class="pillbar">
      <button id="addServiceRTU" type="button">+ RTU</button>
      <button id="addServiceF" type="button">+ Furnace</button>
      <button id="addServiceUH" type="button">+ Unit Heater</button>
      <button id="addServiceRH" type="button">+ Radiant Heater</button>
      <button id="addServiceEF" type="button">+ Exhaust Fan</button>
      <button id="addServiceMUA" type="button">+ MUA</button>
    </div>

    <label>Reason for call</label>
    <textarea id="reason" placeholder="Example: No heat in lobby."></textarea>

    <label>Findings / Diagnosis</label>
    <textarea id="diagnosis" placeholder="Example: RTU1 heat exchanger is cracked."></textarea>

    <label>Repairs made</label>
    <textarea id="repairsMade" placeholder="Example: Confirmed failure and shut unit down."></textarea>

    <label>Parts used</label>
    <textarea id="serviceUsed" placeholder="Example: two 4l190 belts and one 16 by 25 by one"></textarea>

    <label>Cost of parts</label>
    <input id="serviceCost" placeholder="Example: $23">

    <label>Parts needed for repair quote</label>
    <textarea id="quoteParts" placeholder="Example: 1 GAS VALVE and 1 IGNITER"></textarea>

    <label>Labor for repair quote</label>
    <input id="quoteLabor" placeholder="Example: 3 HOURS">

    <label>Recommendations / Next steps</label>
    <textarea id="recommendations" placeholder="Example: Replace RTU1 due to cracked heat exchanger."></textarea>
  </div>

  <div id="quoteSection" class="hidden">
    <label>Equipment Repaired</label>
    <textarea id="quoteEquip" placeholder="Example: RTU1 on the roof..."></textarea>
    
    <div class="pillbar">
      <button id="addQuoteRTU" type="button">+ RTU</button>
      <button id="addQuoteF" type="button">+ Furnace</button>
      <button id="addQuoteUH" type="button">+ Unit Heater</button>
      <button id="addQuoteRH" type="button">+ Radiant Heater</button>
      <button id="addQuoteEF" type="button">+ Exhaust Fan</button>
      <button id="addQuoteMUA" type="button">+ MUA</button>
    </div>

    <label>Original Issue Resolved</label>
    <textarea id="quoteIssue" placeholder="Example: Completing quoted repair for bad inducer motor."></textarea>

    <label>Repairs Completed</label>
    <textarea id="quoteRepairs" placeholder="Example: Removed old inducer motor and installed new OEM motor. Cleaned pressure switch tubing."></textarea>

    <label>Parts Installed</label>
    <textarea id="quotePartsUsed" placeholder="Example: 1 Fasco Inducer Motor assembly"></textarea>

    <label>System Testing & Verification</label>
    <textarea id="quoteTesting" placeholder="Example: Cycled heat multiple times, verified proper draft pressure and ignition sequence. Unit is running normally."></textarea>

    <label>Further Recommendations</label>
    <textarea id="quoteRecs" placeholder="Example: No further issues found at this time."></textarea>
  </div>

  <button id="generate" type="button">Generate Report</button>
  <button id="copy" type="button">Copy Report</button>
  <button id="clear" type="button">Clear Current Mode</button>

  <label>Output</label>
  <pre id="output"></pre>
</div>

<div id="historySection" class="hidden">
  <div class="history-box">
    <label>Customer</label>
    <select id="historyCustomer">
      <option value="">Select customer</option>
    </select>

    <label>Location</label>
    <select id="historyLocation">
      <option value="">Select location</option>
    </select>

    <div id="historyLatestWrap" class="hidden">
      <div class="summary-card">
        <h3>Last Time We Were On Site</h3>
        <div id="historyLatest"></div>
      </div>
    </div>
  </div>
</div>

</div> 

<script>
/* ---------- basics ---------- */
function pad2(n){ return String(n).padStart(2, "0"); }
function today(){ const d = new Date(); return pad2(d.getMonth() + 1) + "/" + pad2(d.getDate()) + "/" + d.getFullYear(); }
function todayDB(){ const d = new Date(); return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }

const DEFAULT_PM_WORKDONE = "Changed filters/belts and verified operations of equipment";
const DEFAULT_PM_NOTES = "All units are running good at this time.";

let currentMode = "PM";

/* ---------- mode switching ---------- */
function applyMode(){
  const pmBtn = document.getElementById("modePM");
  const serviceBtn = document.getElementById("modeService");
  const quoteBtn = document.getElementById("modeQuote");
  const historyBtn = document.getElementById("modeHistory");
  
  const entrySection = document.getElementById("entrySection");
  const historySection = document.getElementById("historySection");
  const pmSection = document.getElementById("pmSection");
  const serviceSection = document.getElementById("serviceSection");
  const quoteSection = document.getElementById("quoteSection");

  pmBtn.classList.remove("active"); 
  serviceBtn.classList.remove("active");
  quoteBtn.classList.remove("active");
  historyBtn.classList.remove("active");
  
  entrySection.classList.add("hidden"); 
  historySection.classList.add("hidden"); 
  pmSection.classList.add("hidden");
  serviceSection.classList.add("hidden");
  quoteSection.classList.add("hidden");

  if(currentMode === "PM"){
    pmBtn.classList.add("active"); 
    entrySection.classList.remove("hidden");
    pmSection.classList.remove("hidden"); 
  } else if(currentMode === "SERVICE"){
    serviceBtn.classList.add("active"); 
    entrySection.classList.remove("hidden");
    serviceSection.classList.remove("hidden"); 
  } else if (currentMode === "QUOTE") {
    quoteBtn.classList.add("active"); 
    entrySection.classList.remove("hidden");
    quoteSection.classList.remove("hidden");
  } else if (currentMode === "HISTORY") {
    historyBtn.classList.add("active"); 
    historySection.classList.remove("hidden");
  }
}

document.getElementById("modePM").onclick = function(){ currentMode = "PM"; applyMode(); };
document.getElementById("modeService").onclick = function(){ currentMode = "SERVICE"; applyMode(); };
document.getElementById("modeQuote").onclick = function(){ currentMode = "QUOTE"; applyMode(); };
document.getElementById("modeHistory").onclick = function(){ currentMode = "HISTORY"; applyMode(); };


/* ---------- init ---------- */
(function init(){ applyMode(); })();
</script>
</body>
</html>

<script>
/* ---------- basics ---------- */
function pad2(n){
  return String(n).padStart(2, "0");
}

function today(){
  const d = new Date();
  return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
}

const DEFAULT_PM_WORKDONE = "Changed filters/belts and verified operations of equipment";
const DEFAULT_PM_NOTES = "All units are running good at this time.";
const DRAFT_KEY = "hvac_note_tool_v16";
const HISTORY_KEY = "hvac_site_history_v1";

const KNOWN_FILTER_SIZES = [
  "14X20X1",
  "16X16X2","16X20X2","16X24X2","16X25X1","16X25X2",
  "18X20X2","18X24X2","18X25X2",
  "20X20X1","20X20X2","20X24X1","20X24X2","20X25X1","20X25X2","20X30X2","20X35X2",
  "24X24X1","24X24X2","24X24X4"
];

const KNOWN_BELTS = [
  "4L190","4L200","4L270",
  "AX20","AX22","AX23","AX25","AX26","AX32","AX35","AX36","AX37","AX39","AX40","AX41","AX44","AX46","AX48","AX49","AX51","AX52","AX53","AX54","AX58","AX61",
  "BX38","BX42","BX44","BX46","BX49","BX54","BX56","BX57","BX61","BX62","BX64","BX65","BX66","BX68","BX75","BX81","BX96",
  "A20","A22","A23","A25","A26","A32","A35","A36","A37","A39","A40","A41","A44","A46","A48","A49","A51","A52","A53","A54","A58","A61",
  "B38","B42","B44","B46","B49","B54","B56","B57","B61","B62","B64","B65","B66","B68","B75","B81","B96"
];

const NUM_MAP = {
  zero:"0",
  one:"1", two:"2", three:"3", four:"4", five:"5",
  six:"6", seven:"7", eight:"8", nine:"9", ten:"10",
  ones:"1", twos:"2", threes:"3", fours:"4", fives:"5",
  to:"2", too:"2"
};

const EQUIP_LABELS = {
  RTU:"Rooftop Unit",
  F:"Furnace",
  UH:"Unit Heater",
  RH:"Radiant Heater",
  EF:"Exhaust Fan",
  MUA:"Make-Up Air Unit"
};

let currentMode = "PM";
let currentHistoryCustomer = "";
let currentHistoryLocation = "";
let currentHistorySelectedIndex = 0;

/* ---------- AI AUTO-LOCATION PARSER (JSON MODE - BULLETPROOF) ---------- */
async function autoParseLocation() {
    const locInput = document.getElementById('location');
    const rawText = locInput.value.trim();

    if (!rawText) return;
    if (rawText === rawText.toUpperCase() && rawText.includes(' - ')) return;

    const originalBg = locInput.style.backgroundColor;
    locInput.style.backgroundColor = '#e8f4fd'; 

    if (typeof firebaseConfig !== 'undefined' && firebaseConfig.apiKey) {
        const prompt = `
        Extract the location details from the technician's spoken text.
        IGNORE conversational filler (e.g., "I am at", "I'm in", "heading to", "over on", "the").
        Return a JSON object with EXACTLY these keys: "business", "city", "street".
        Abbreviate street types standardly (e.g., Street -> ST, Avenue -> AVE, Road -> RD, Drive -> DR).
        If a piece of information is missing, leave its value as an empty string "".
        Output NOTHING BUT THE RAW JSON OBJECT. No markdown formatting, no backticks.
        
        Text: "${rawText}"
        `;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${firebaseConfig.apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: prompt }] }], 
                    generationConfig: { 
                        temperature: 0.1,
                        responseMimeType: "application/json"
                    } 
                })
            });

            const data = await response.json();
            if (data.candidates && data.candidates.length > 0) {
                let aiResponseText = data.candidates[0].content.parts[0].text;
                
                // THE FIX: Strip out the hidden Markdown backticks the AI tries to sneak in
                aiResponseText = aiResponseText.replace(/```json/gi, '').replace(/```/g, '').trim();
                
                const locationData = JSON.parse(aiResponseText);
                
                const business = (locationData.business || "").toUpperCase().trim();
                const city = (locationData.city || "").toUpperCase().trim();
                const street = (locationData.street || "").toUpperCase().trim();
                
                const finalParts = [business, city, street].filter(Boolean);
                locInput.value = finalParts.join(" - ");
            }
        } catch (error) { 
            console.error("AI JSON Parsing Failed:", error); 
            // Fallback: If it fails, just capitalize the raw text so the tech isn't stuck
            locInput.value = rawText.toUpperCase();
        }
    } else {
        console.warn("Firebase API Key is missing. AI parsing aborted.");
    }
    
    locInput.style.backgroundColor = originalBg;
}

/* ---------- generic helpers ---------- */
function convertNumbers(text){
  let t = text || "";
  Object.keys(NUM_MAP).forEach(k => {
    const r = new RegExp("\\b" + k + "\\b", "gi");
    t = t.replace(r, NUM_MAP[k]);
  });
  return t;
}

function levenshtein(a, b){
  const m = a.length;
  const n = b.length;
  const dp = Array.from({length:m + 1}, () => Array(n + 1).fill(0));
  for(let i = 0; i <= m; i++) dp[i][0] = i;
  for(let j = 0; j <= n; j++) dp[0][j] = j;
  for(let i = 1; i <= m; i++){
    for(let j = 1; j <= n; j++){
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(
        dp[i - 1][j] + 1,
        dp[i][j - 1] + 1,
        dp[i - 1][j - 1] + cost
      );
    }
  }
  return dp[m][n];
}

function closestMatch(value, list, maxDistance){
  let best = value;
  let bestScore = Infinity;
  list.forEach(item => {
    const d = levenshtein(value.toUpperCase(), item.toUpperCase());
    if(d < bestScore){
      bestScore = d;
      best = item;
    }
  });
  return bestScore <= maxDistance ? best : value;
}

function autoGrow(el){
  if(!el) return;
  el.style.height = "auto";
  el.style.height = Math.max(el.scrollHeight, 90) + "px";
}

function escapeHtml(text){
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

/* ---------- location ---------- */
function titleCaseWords(str){
  return str
    .split(" ")
    .filter(Boolean)
    .map(w => {
      const upper = w.toUpperCase();
      if(/^\d/.test(w)) return w;
      if(["NW","NE","SW","SE"].includes(upper)) return upper;
      return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
    })
    .join(" ");
}

function normalizeStreetSuffix(street){
  let s = street.trim().toLowerCase();
  s = s.replace(/\bavenue\b/g, "Ave.");
  s = s.replace(/\bstreet\b/g, "St.");
  s = s.replace(/\broad\b/g, "Rd.");
  s = s.replace(/\bdrive\b/g, "Dr.");
  s = s.replace(/\bboulevard\b/g, "Blvd.");
  s = s.replace(/\blane\b/g, "Ln.");
  s = s.replace(/\bcourt\b/g, "Ct.");
  s = s.replace(/\bplace\b/g, "Pl.");
  s = s.replace(/\bhighway\b/g, "Hwy.");
  return titleCaseWords(s);
}

function normalizeSiteName(name){
  let s = (name || "").trim().toLowerCase();
  s = s.replace(/\bthe\b/g, " ");
  s = s.replace(/\s{2,}/g, " ").trim();
  s = s.replace(/\btake five\b/g, "take 5");
  s = s.replace(/\bplanet fitness\b/g, "planet fitness");

  return titleCaseWords(s)
    .replace(/\bTake 5\b/g, "Take 5")
    .replace(/\bPlanet Fitness\b/g, "Planet Fitness");
}

function formatLocation(raw){
  let t = (raw || "").trim().toLowerCase();
  if(!t) return "";

  t = t.replace(/[.,]/g, " ");
  t = t.replace(/\bi am at\b/g, "");
  t = t.replace(/\bim at\b/g, "");
  t = t.replace(/\bi'm at\b/g, "");
  t = t.replace(/\bwe are at\b/g, "");
  t = t.replace(/\s{2,}/g, " ").trim();

  t = t.replace(/\btake five\b/g, "take 5");
  t = t.replace(/\bplanet fitness\b/g, "planet fitness");

  let m;

  m = t.match(/^(.+?)\s+in\s+(.+?)\s+on\s+(.+)$/i);
  if(m){
    const site = normalizeSiteName(m[1]);
    const city = titleCaseWords(m[2].trim());
    const street = normalizeStreetSuffix(m[3].trim());
    return `${site} - ${city} - ${street}`;
  }

  m = t.match(/^(.+?)\s+on\s+(.+?)\s+in\s+(.+)$/i);
  if(m){
    const site = normalizeSiteName(m[1]);
    const street = normalizeStreetSuffix(m[2].trim());
    const city = titleCaseWords(m[3].trim());
    return `${site} - ${city} - ${street}`;
  }

  m = t.match(/^(.+?)\s+in\s+(.+)$/i);
  if(m){
    const site = normalizeSiteName(m[1]);
    const city = titleCaseWords(m[2].trim());
    return `${site} - ${city}`;
  }

  return normalizeSiteName(t);
}

function getCustomerFromLocation(location){
  const parts = String(location || "").split(" - ").map(s => s.trim()).filter(Boolean);
  return parts.length ? parts[0] : "Unknown";
}

/* ---------- equipment parsing ---------- */
function normalizeEquipmentSpeech(text){
  let t = (text || "").toLowerCase();
  t = t.replace(/\n/g, " ");
  t = t.replace(/[–—]/g, "-");
  t = t.replace(/\s+and\s+/g, ", ");
  t = t.replace(/\s{2,}/g, " ").trim();

  t = t.replace(/\bare\s*to\s*you\b/g, "rtu");
  t = t.replace(/\bar\s*to\s*you\b/g, "rtu");
  t = t.replace(/\br\s*to\s*you\b/g, "rtu");
  t = t.replace(/\br\s*too\s*you\b/g, "rtu");
  t = t.replace(/\br\s*two\s*you\b/g, "rtu");
  t = t.replace(/\br\s*t\s*u\b/g, "rtu");
  t = t.replace(/\brt\s*you\b/g, "rtu");
  t = t.replace(/\brt\s*u\b/g, "rtu");
  t = t.replace(/\brt\b/g, "rtu");
  t = t.replace(/\bhour\s*to\s*you\b/g, "rtu");
  t = t.replace(/\bone\s*hour\s*to\s*you\b/g, "1 rtu");
  t = t.replace(/\b1\s*hour\s*to\s*you\b/g, "1 rtu");

  t = t.replace(/\bfurnaces?\b/g, "furnace");
  t = t.replace(/\bunit heaters?\b/g, "unit heater");
  t = t.replace(/\bradiant heaters?\b/g, "radiant heater");
  t = t.replace(/\bexhaust fans?\b/g, "exhaust fan");
  t = t.replace(/\bmake[\s-]?up air(?: unit)?s?\b/g, "mua");
  t = t.replace(/\brooftop units?\b/g, "rtu");

  t = convertNumbers(t);
  return t;
}

function expandEquipmentCounts(text){
  let t = normalizeEquipmentSpeech(text);

  const patterns = [
    {re:/\b(\d+)\s*rtu\b/g, code:"RTU"},
    {re:/\b(\d+)\s*furnace\b/g, code:"F"},
    {re:/\b(\d+)\s*unit heater\b/g, code:"UH"},
    {re:/\b(\d+)\s*radiant heater\b/g, code:"RH"},
    {re:/\b(\d+)\s*exhaust fan\b/g, code:"EF"},
    {re:/\b(\d+)\s*mua\b/g, code:"MUA"}
  ];

  const out = [];
  patterns.forEach(p => {
    let m;
    while((m = p.re.exec(t)) !== null){
      const count = parseInt(m[1], 10);
      if(!Number.isNaN(count) && count > 0 && count < 50){
        for(let i = 1; i <= count; i++) out.push(p.code + i);
      }
    }
  });

  const directMatches = [...t.matchAll(/\b(RTU|RH|UH|F|EF|MUA)\s*-?\s*(\d+)\b/gi)];
  directMatches.forEach(m => {
    out.push(m[1].toUpperCase() + m[2]);
  });

  const unique = [];
  out.forEach(x => {
    if(!unique.includes(x)) unique.push(x);
  });

  return unique.join(", ");
}

function parseEquipCodes(codeCsv){
  return (codeCsv || "").split(",").map(s => s.trim()).filter(Boolean);
}

function expandEquipment(codeCsv){
  const codes = parseEquipCodes(codeCsv);
  if(!codes.length) return "Not listed";
  return codes.map(c => {
    const m = c.match(/^([A-Z]+)(\d+)$/);
    if(!m) return c;
    const label = EQUIP_LABELS[m[1]] || m[1];
    return `${m[1]}${m[2]} (${label})`;
  }).join("\n");
}

function firstUnitOfType(codes, type){
  return codes.find(c => c.startsWith(type)) || null;
}

function formatEquipmentFieldValue(raw){
  const codes = expandEquipmentCounts(raw);
  return codes || raw;
}

/* ---------- parts parsing ---------- */
function normalizeFilterSize(rawSize){
  let s = (rawSize || "").toUpperCase().trim();
  s = s.replace(/\bbuy\b/gi, "BY");
  s = convertNumbers(s);
  s = s.replace(/\s+BY\s+/gi, "X");
  s = s.replace(/\s*X\s*/gi, "X");
  s = s.replace(/\s+/g, "");
  s = s.replace(/[^0-9X]/g, "");

  const nums = s.split("X").filter(Boolean);
  if(nums.length === 3){
    s = `${nums[0]}X${nums[1]}X${nums[2]}`;
  }

  return closestMatch(s, KNOWN_FILTER_SIZES, 2).toUpperCase();
}

function normalizeBeltCode(rawCode){
  let s = (rawCode || "").toUpperCase().trim();
  s = s.replace(/\s+/g, "");
  s = s.replace(/[-_]/g, "");
  const m = s.match(/^(AX|BX|A|B|4L)(\d+)$/);
  if(m){
    const code = m[1] + m[2];
    return closestMatch(code, KNOWN_BELTS, 1).toUpperCase();
  }
  return closestMatch(s, KNOWN_BELTS, 1).toUpperCase();
}

function formatPartOutput(qty, value){
  return `${qty} - ${String(value).toUpperCase()}`;
}

function recoverConcatenatedFilter(firstNum, secondNum, thirdNum){
  const a = String(firstNum);
  const b = String(secondNum);
  const c = String(thirdNum);

  for(let i = 1; i < a.length; i++){
    const qty = a.slice(0, i);
    const firstDim = a.slice(i);
    const candidate = `${firstDim}X${b}X${c}`;
    const matched = closestMatch(candidate, KNOWN_FILTER_SIZES, 2);
    if(KNOWN_FILTER_SIZES.includes(matched)){
      return `${parseInt(qty, 10)} - ${matched}`;
    }
  }
  return null;
}

function parsePartItem(item){
  let t = item.toLowerCase().trim();
  if(!t) return [];

  t = t.replace(/\bbuy\b/g, "by");
  t = convertNumbers(t);
  t = t.replace(/\s{2,}/g, " ").trim();
  t = t.replace(/\bfilters?\b/g, "").trim();
  t = t.replace(/\bbelts?\b/g, "").trim();

  let beltMatch = t.match(/^(\d+)\s+(ax|bx|a|b|4l)\s*-?\s*(\d+)$/i);
  if(beltMatch){
    const qty = parseInt(beltMatch[1], 10);
    const code = normalizeBeltCode(beltMatch[2] + beltMatch[3]);
    return [formatPartOutput(qty, code)];
  }

  beltMatch = t.match(/^(\d+)(ax|bx|a|b|4l)\s*-?\s*(\d+)$/i);
  if(beltMatch){
    const qty = parseInt(beltMatch[1], 10);
    const code = normalizeBeltCode(beltMatch[2] + beltMatch[3]);
    return [formatPartOutput(qty, code)];
  }

  beltMatch = t.match(/^(\d+)\s+(4)\s*l\s*(\d+)$/i);
  if(beltMatch){
    const qty = parseInt(beltMatch[1], 10);
    const code = normalizeBeltCode(`4L${beltMatch[3]}`);
    return [formatPartOutput(qty, code)];
  }

  let f = t;
  f = f.replace(/\s+by\s+/g, " x ");
  f = f.replace(/\s*x\s*/g, " x ");
  f = f.replace(/\s{2,}/g, " ").trim();

  let m = f.match(/^(\d+)\s+(\d+)\s+(\d+)\s*x\s*(\d+)$/i);
  if(m){
    const qty = parseInt(m[1], 10);
    const size = normalizeFilterSize(`${m[2]}x${m[3]}x${m[4]}`);
    return [formatPartOutput(qty, size)];
  }

  m = f.match(/^(\d+)\s+(\d+)\s*x\s*(\d+)\s*x\s*(\d+)$/i);
  if(m){
    const qty = parseInt(m[1], 10);
    const size = normalizeFilterSize(`${m[2]}x${m[3]}x${m[4]}`);
    return [formatPartOutput(qty, size)];
  }

  m = f.match(/^(\d+)x(\d+)x(\d+)x(\d+)$/i);
  if(m){
    const qty = parseInt(m[1], 10);
    const size = normalizeFilterSize(`${m[2]}x${m[3]}x${m[4]}`);
    return [formatPartOutput(qty, size)];
  }

  m = f.match(/^(\d+)\s+(\d+x\d+x\d+)$/i);
  if(m){
    const qty = parseInt(m[1], 10);
    const size = normalizeFilterSize(m[2]);
    return [formatPartOutput(qty, size)];
  }

  m = f.match(/^(\d+)\s+(\d+)\s*x\s*(\d+)$/i);
  if(m){
    const recovered = recoverConcatenatedFilter(m[1], m[2], m[3]);
    if(recovered) return [recovered];
  }

  const nums = f.match(/\d+/g);
  if(nums && nums.length === 4){
    const qty = parseInt(nums[0], 10);
    const size = normalizeFilterSize(`${nums[1]}x${nums[2]}x${nums[3]}`);
    return [formatPartOutput(qty, size)];
  }

  if(nums && nums.length === 3){
    const recovered = recoverConcatenatedFilter(nums[0], nums[1], nums[2]);
    if(recovered) return [recovered];
  }

  const beltNums = f.match(/^(\d+)\s*(ax|bx|a|b|4l)\s*(\d+)$/i);
  if(beltNums){
    const qty = parseInt(beltNums[1], 10);
    const code = normalizeBeltCode(beltNums[2] + beltNums[3]);
    return [formatPartOutput(qty, code)];
  }

  return [item.trim().toUpperCase()];
}

function normalizeParts(text){
  let t = (text || "").trim();
  if(!t) return "";

  t = t.replace(/\n/g, " ");
  t = t.replace(/\s+and\s+/gi, ", ");
  t = t.replace(/\s{2,}/g, " ").trim();

  const items = t.split(/[,;]+/).map(s => s.trim()).filter(Boolean);
  const out = [];

  items.forEach(item => {
    parsePartItem(item).forEach(x => {
      const cleaned = String(x)
        .replace(/\bFILTERS?\b/gi, "")
        .replace(/\bBELTS?\b/gi, "")
        .replace(/\s{2,}/g, " ")
        .trim()
        .toUpperCase();
      if(cleaned) out.push(cleaned);
    });
  });

  return out.join(", ");
}

/* ---------- notes ---------- */
function normalizeNotesForParsing(text){
  let t = (text || "").trim().toLowerCase();
  t = t.replace(/\n/g, " ");
  t = t.replace(/\s{2,}/g, " ").trim();

  t = t.replace(/\bare\s*to\s*you\b/g,"rtu");
  t = t.replace(/\bar\s*to\s*you\b/g,"rtu");
  t = t.replace(/\br\s*to\s*you\b/g,"rtu");
  t = t.replace(/\br\s*too\s*you\b/g,"rtu");
  t = t.replace(/\br\s*two\s*you\b/g,"rtu");
  t = t.replace(/\br\s*t\s*u\b/g,"rtu");
  t = t.replace(/\brt\s*you\b/g,"rtu");
  t = t.replace(/\brt\s*u\b/g,"rtu");
  t = t.replace(/\brt\b/g,"rtu");
  t = t.replace(/\bhour\s*to\s*you\b/g,"rtu");

  t = t.replace(/\bfurnaces?\b/g,"furnace");
  t = t.replace(/\bunit heaters?\b/g,"unit heater");
  t = t.replace(/\bradiant heaters?\b/g,"radiant heater");
  t = t.replace(/\bexhaust fans?\b/g,"exhaust fan");
  t = t.replace(/\bmake[\s-]?up air(?: unit)?s?\b/g,"mua");
  t = t.replace(/\brooftop units?\b/g,"rtu");

  t = convertNumbers(t);
  t = t.replace(/\b(rtu|rh|uh|f|ef|mua)\s*(\d+)\b/gi, (_, a, n) => `${a.toUpperCase()}${n}`);
  return t;
}

function extractRepairsFromNotes(notesText, equipCodes){
  const text = (notesText || "").trim();
  if(!text) return {general:"", repairs:[]};

  const pieces = text
    .replace(/\r/g,"")
    .split(/\n+|(?<=[.?!])\s+/)
    .map(s => s.trim())
    .filter(Boolean);

  const repairs = [];
  const general = [];

  function looksLikeRepair(s){
    return /\b(needs?|need|replace|replaced|failed|bad|broken|repair|recommend|suggest|not working|no heat|no cooling|leaking|motor|belt|capacitor|blower|fan|heat exchanger|cracked)\b/i.test(s);
  }

  pieces.forEach(piece => {
    const norm = normalizeNotesForParsing(piece);
    let unit = null;

    const explicit = norm.match(/\b(RTU|RH|UH|F|EF|MUA)\d+\b/i);
    if(explicit) unit = explicit[0].toUpperCase();

    if(!unit && /\brtu\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "RTU");
    if(!unit && /\bfurnace\b|\bf\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "F");
    if(!unit && /\bunit heater\b|\buh\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "UH");
    if(!unit && /\bradiant heater\b|\brh\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "RH");
    if(!unit && /\bexhaust fan\b|\bef\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "EF");
    if(!unit && /\bmua\b|make up air/i.test(norm)) unit = firstUnitOfType(equipCodes, "MUA");

    if(unit && looksLikeRepair(norm)){
      let msg = piece.trim();
      msg = msg.replace(/^(rtu|rt|furnace|unit heater|radiant heater|exhaust fan|make[\s-]?up air|mua|ef|rh|uh|f)\s*-?\s*(one|two|three|four|five|six|seven|eight|nine|ten|\d+)?\s*/i, "");
      msg = msg.replace(/^\s*[:\-–]\s*/, "");
      if(!msg) msg = "Repair needed.";
      repairs.push(`${unit} - ${msg}`);
    } else {
      general.push(piece);
    }
  });

  return {
    general: general.join(" ").trim(),
    repairs
  };
}

/* ---------- history storage ---------- */
function getHistoryData(){
  try{
    return JSON.parse(localStorage.getItem(HISTORY_KEY) || "{}");
  }catch(e){
    return {};
  }
}

function saveHistoryData(data){
  localStorage.setItem(HISTORY_KEY, JSON.stringify(data));
}

function buildVisitSummary(visit){
  if(visit.mode === "PM"){
    return {
      date: visit.date,
      type: "PM",
      primary: visit.location,
      details: visit.notesFinal || "No notes.",
      parts: visit.partsUsed || "NONE"
    };
  } else if(visit.mode === "QUOTED REPAIR"){
    return {
      date: visit.date,
      type: "QUOTED REPAIR",
      primary: visit.location,
      details: visit.repairsCompleted || "No repairs recorded.",
      parts: visit.partsUsed || "NONE"
    };
  }

  return {
    date: visit.date,
    type: "SERVICE CALL",
    primary: visit.location,
    details: visit.diagnosis || "No diagnosis.",
    parts: visit.partsUsed || "NONE"
  };
}

function saveVisitToHistory(visit){
  if(!visit.location) return;

  const customer = getCustomerFromLocation(visit.location);
  const data = getHistoryData();

  if(!data[customer]) data[customer] = {};
  if(!data[customer][visit.location]) data[customer][visit.location] = [];

  data[customer][visit.location].unshift(visit);
  saveHistoryData(data);
}

function populateHistoryCustomers(){
  const select = document.getElementById("historyCustomer");
  const data = getHistoryData();
  const customers = Object.keys(data).sort();

  select.innerHTML = `<option value="">Select customer</option>`;
  customers.forEach(customer => {
    const opt = document.createElement("option");
    opt.value = customer;
    opt.textContent = customer;
    select.appendChild(opt);
  });

  if(customers.includes(currentHistoryCustomer)){
    select.value = currentHistoryCustomer;
  } else {
    currentHistoryCustomer = "";
  }

  populateHistoryLocations();
}

function populateHistoryLocations(){
  const locationSelect = document.getElementById("historyLocation");
  const data = getHistoryData();

  locationSelect.innerHTML = `<option value="">Select location</option>`;

  if(!currentHistoryCustomer || !data[currentHistoryCustomer]){
    currentHistoryLocation = "";
    renderHistoryView();
    return;
  }

  const locations = Object.keys(data[currentHistoryCustomer]).sort();
  locations.forEach(location => {
    const opt = document.createElement("option");
    opt.value = location;
    opt.textContent = location;
    locationSelect.appendChild(opt);
  });

  if(locations.includes(currentHistoryLocation)){
    locationSelect.value = currentHistoryLocation;
  } else {
    currentHistoryLocation = "";
  }

  renderHistoryView();
}

function renderHistoryView(){
  const latestWrap = document.getElementById("historyLatestWrap");
  const olderWrap = document.getElementById("historyOlderWrap");
  const fullWrap = document.getElementById("historyFullWrap");
  const latest = document.getElementById("historyLatest");
  const olderList = document.getElementById("historyOlderList");
  const full = document.getElementById("historyFullReport");
  const data = getHistoryData();

  latestWrap.classList.add("hidden");
  olderWrap.classList.add("hidden");
  fullWrap.classList.add("hidden");
  latest.innerHTML = "";
  olderList.innerHTML = "";
  full.textContent = "";

  if(!currentHistoryCustomer || !currentHistoryLocation) return;
  if(!data[currentHistoryCustomer] || !data[currentHistoryCustomer][currentHistoryLocation]) return;

  const visits = data[currentHistoryCustomer][currentHistoryLocation];
  if(!visits.length) return;

  const latestVisit = visits[0];
  const s = buildVisitSummary(latestVisit);

  latest.innerHTML = `
    <div class="summary-row"><span class="summary-label">Date:</span> ${escapeHtml(s.date)}</div>
    <div class="summary-row"><span class="summary-label">Type:</span> ${escapeHtml(s.type)}</div>
    <div class="summary-row"><span class="summary-label">What was done last time:</span> ${escapeHtml(s.details)}</div>
    <div class="summary-row"><span class="summary-label">Parts used:</span> ${escapeHtml(s.parts)}</div>
  `;
  latestWrap.classList.remove("hidden");

  if(typeof currentHistorySelectedIndex !== "number" || currentHistorySelectedIndex >= visits.length){
    currentHistorySelectedIndex = 0;
  }

  if(visits.length > 1){
    olderWrap.classList.remove("hidden");
    visits.forEach((visit, idx) => {
      const box = document.createElement("div");
      const sum = buildVisitSummary(visit);
      box.className = "history-item" + (idx === currentHistorySelectedIndex ? " active" : "");
      box.innerHTML = `
        <div class="history-title">${escapeHtml(sum.date)} - ${escapeHtml(sum.type)}</div>
        <div class="history-sub">${escapeHtml(sum.details)}</div>
      `;
      box.onclick = () => {
        currentHistorySelectedIndex = idx;
        renderHistoryView();
      };
      olderList.appendChild(box);
    });
  } else {
    const box = document.createElement("div");
    const sum = buildVisitSummary(latestVisit);
    box.className = "history-item active";
    box.innerHTML = `
      <div class="history-title">${escapeHtml(sum.date)} - ${escapeHtml(sum.type)}</div>
      <div class="history-sub">${escapeHtml(sum.details)}</div>
    `;
    box.onclick = () => {
      currentHistorySelectedIndex = 0;
      renderHistoryView();
    };
    olderList.appendChild(box);
    olderWrap.classList.remove("hidden");
  }

  full.textContent = visits[currentHistorySelectedIndex].report || "";
  fullWrap.classList.remove("hidden");
}

  }

document.getElementById("generate").onclick = function(){
  formatLocationField();
  const location = document.getElementById("location").value || "[Location]";
  const date = today();

  let report = "";
  let visit = null;

  if(currentMode === "PM"){
    formatEquipmentField();
    formatUsedField();
    formatNextField();

    const equipRaw = document.getElementById("equipment").value || "";
    const equipCodes = parseEquipCodes(equipRaw);
    const equip = expandEquipment(equipRaw);

    const notesRaw = (document.getElementById("notes").value || "").trim();
    const extracted = extractRepairsFromNotes(notesRaw, equipCodes);

    let notesFinal = DEFAULT_PM_NOTES;
    if(extracted.general){
      notesFinal = extracted.general;
    } else if(extracted.repairs.length){
      notesFinal = extracted.repairs.join("\n");
    }

    const used = document.getElementById("used").value.trim() ? normalizeParts(document.getElementById("used").value) : "NONE";
    const next = document.getElementById("next").value.trim() ? normalizeParts(document.getElementById("next").value) : "NONE";
    const cost = document.getElementById("cost").value || "Unknown";
    const workdone = document.getElementById("workdone").value || DEFAULT_PM_WORKDONE;

    report = `PM\n\nLocation:\n${location}\n\nDate:\n${date}\n\nEquipment on Site:\n${equip}\n\nNotes / Repairs:\n${notesFinal}\n\nWork done:\n${workdone}\n\nParts used:\n${used}\n\nCost of parts (if known):\n${cost}\n\nParts needed next PM:\n${next}\n\nPictures:\nNameplate photos attached.\n`;

    visit = {
      date,
      mode: "PM",
      customer: getCustomerFromLocation(location),
      location,
      equipment: equip,
      notesFinal,
      workdone,
      partsUsed: used,
      partsNeeded: next,
      cost,
      report
    };
    
  } else if(currentMode === "SERVICE"){
    formatServiceEquipmentField();
    formatServiceUsedField();
    formatQuotePartsField();

    const serviceEquipRaw = document.getElementById("serviceEquipment").value || "";
    const serviceEquipDisplay = parseEquipCodes(serviceEquipRaw).length
      ? expandEquipment(serviceEquipRaw)
      : (serviceEquipRaw || "Not listed");

    const reason = document.getElementById("reason").value.trim() || "Not listed.";
    const diagnosis = document.getElementById("diagnosis").value.trim() || "Not listed.";
    const repairsMade = document.getElementById("repairsMade").value.trim() || "None.";
    const used = document.getElementById("serviceUsed").value.trim() ? normalizeParts(document.getElementById("serviceUsed").value) : "NONE";
    const cost = document.getElementById("serviceCost").value || "Unknown";
    const quoteParts = document.getElementById("quoteParts").value.trim() ? normalizeParts(document.getElementById("quoteParts").value) : "NONE";
    const quoteLabor = document.getElementById("quoteLabor").value.trim() || "NONE";
    const recommendations = document.getElementById("recommendations").value.trim() || "None.";

    report = `SERVICE CALL\n\nLocation:\n${location}\n\nDate:\n${date}\n\nEquipment worked on:\n${serviceEquipDisplay}\n\nReason for call:\n${reason}\n\nFindings / Diagnosis:\n${diagnosis}\n\nRepairs made:\n${repairsMade}\n\nParts used:\n${used}\n\nCost of parts (if known):\n${cost}\n\nParts needed for repair quote:\n${quoteParts}\n\nLabor for repair quote:\n${quoteLabor}\n\nRecommendations / Next steps:\n${recommendations}\n\nPictures:\nNameplate photos attached.\n`;

    visit = {
      date,
      mode: "SERVICE CALL",
      customer: getCustomerFromLocation(location),
      location,
      equipmentWorkedOn: serviceEquipDisplay,
      reason,
      diagnosis,
      repairsMade,
      partsUsed: used,
      cost,
      quoteParts,
      quoteLabor,
      recommendations,
      report
    };
    
  } else if(currentMode === "QUOTE") {
    formatQuoteEquipField();
    formatQuotePartsUsedField();

    const quoteEquipRaw = document.getElementById("quoteEquip").value || "";
    const quoteEquipDisplay = parseEquipCodes(quoteEquipRaw).length
      ? expandEquipment(quoteEquipRaw)
      : (quoteEquipRaw || "Not listed");

    const issue = document.getElementById("quoteIssue").value.trim() || "Not listed.";
    const repairsCompleted = document.getElementById("quoteRepairs").value.trim() || "None.";
    const partsInstalled = document.getElementById("quotePartsUsed").value.trim() ? normalizeParts(document.getElementById("quotePartsUsed").value) : "NONE";
    const testing = document.getElementById("quoteTesting").value.trim() || "Not listed.";
    const recs = document.getElementById("quoteRecs").value.trim() || "None.";

    report = `QUOTED REPAIR\n\nLocation:\n${location}\n\nDate:\n${date}\n\nEquipment Repaired:\n${quoteEquipDisplay}\n\nOriginal Issue Resolved:\n${issue}\n\nRepairs Completed:\n${repairsCompleted}\n\nParts Installed:\n${partsInstalled}\n\nSystem Testing & Verification:\n${testing}\n\nFurther Recommendations:\n${recs}\n\nPictures:\nRepair photos attached.\n`;

    visit = {
      date,
      mode: "QUOTED REPAIR",
      customer: getCustomerFromLocation(location),
      location,
      equipmentRepaired: quoteEquipDisplay,
      originalIssue: issue,
      repairsCompleted: repairsCompleted,
      partsUsed: partsInstalled,
      testingVerification: testing,
      recommendations: recs,
      report
    };
  }

  if(report){
    document.getElementById("output").textContent = report;
    if(visit){
      saveVisitToHistory(visit);
      populateHistoryCustomers();
    }
    saveDraft();
  }
};

/* Unified Add Equipment function */
function addEquipmentCode(fieldId, prefix){
  const el = document.getElementById(fieldId);
  const current = (el.value || "").trim();
  const codes = parseEquipCodes(current);
  let max = 0;

  codes.forEach(c => {
    const m = c.match(new RegExp("^" + prefix + "(\\d+)$"));
    if(m) max = Math.max(max, parseInt(m[1], 10));
  });

  const nextNum = max + 1;
  const appendText = current ? current + ", " + prefix + nextNum : prefix + nextNum;
  el.value = appendText;
  autoGrow(el);
  saveDraft();
}

function addEnterFormatter(id, formatter){
  const el = document.getElementById(id);
  if(!el) return;
  el.addEventListener("keydown", (e) => {
    if(
      e.key === "Enter" &&
      !["notes","reason","diagnosis","repairsMade","recommendations", "quoteIssue", "quoteRepairs", "quoteTesting", "quoteRecs"].includes(id)
    ){
      e.preventDefault();
      formatter();
      e.target.blur();
    }
  });
}

function wireAutosave(){
  [
    "location","equipment","notes","used","cost","next","workdone",
    "serviceEquipment","reason","diagnosis","repairsMade","serviceUsed","serviceCost","quoteParts","quoteLabor","recommendations",
    "quoteEquip","quoteIssue","quoteRepairs","quotePartsUsed","quoteTesting","quoteRecs"
  ].forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener("input", () => {
      saveDraft();
      if(el.tagName.toLowerCase() === "textarea"){
        autoGrow(el);
      }
    });
  });

  document.getElementById("equipment").addEventListener("blur", formatEquipmentField);
  document.getElementById("used").addEventListener("blur", formatUsedField);
  document.getElementById("next").addEventListener("blur", formatNextField);
  
  document.getElementById("serviceEquipment").addEventListener("blur", formatServiceEquipmentField);
  document.getElementById("serviceUsed").addEventListener("blur", formatServiceUsedField);
  document.getElementById("quoteParts").addEventListener("blur", formatQuotePartsField);

  document.getElementById("quoteEquip").addEventListener("blur", formatQuoteEquipField);
  document.getElementById("quotePartsUsed").addEventListener("blur", formatQuotePartsUsedField);

  addEnterFormatter("equipment", formatEquipmentField);
  addEnterFormatter("used", formatUsedField);
  addEnterFormatter("next", formatNextField);
  addEnterFormatter("serviceEquipment", formatServiceEquipmentField);
  addEnterFormatter("serviceUsed", formatServiceUsedField);
  addEnterFormatter("quoteParts", formatQuotePartsField);
  addEnterFormatter("quoteEquip", formatQuoteEquipField);
  addEnterFormatter("quotePartsUsed", formatQuotePartsUsedField);

  document.addEventListener("visibilitychange", () => {
    if(document.visibilityState === "hidden") saveDraft();
  });

  window.addEventListener("pagehide", saveDraft);
}

/* ---------- init ---------- */
(function init(){
  document.getElementById("workdone").value = DEFAULT_PM_WORKDONE;
  applyMode();

  const restored = loadDraft();
  if(!restored){
    document.getElementById("draftStatus").textContent = "No saved draft yet.";
    populateHistoryCustomers();
  }

  [
    "equipment","notes","used","next",
    "serviceEquipment","reason","diagnosis","repairsMade","serviceUsed","quoteParts","recommendations",
    "quoteEquip", "quoteIssue", "quoteRepairs", "quotePartsUsed", "quoteTesting", "quoteRecs"
  ].forEach(id => autoGrow(document.getElementById(id)));

  wireAutosave();
  
  // Attach the auto-parser to the location input box
  const locBox = document.getElementById('location');
  if(locBox) {
      locBox.addEventListener('blur', autoParseLocation);
  }
})();
</script>
